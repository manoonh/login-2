<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>

  <style>
    * { box-sizing: border-box; }

    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      color:#fff;
      background:#070814;
      overflow:hidden;
    }

    .bg{
      position:fixed;
      inset:-20%;
      background:
        radial-gradient(circle at 20% 20%, rgba(93,24,220,.45), transparent 45%),
        radial-gradient(circle at 80% 30%, rgba(0,200,255,.25), transparent 40%),
        radial-gradient(circle at 50% 90%, rgba(255,0,200,.18), transparent 45%);
      filter: blur(30px);
      z-index:-1;
    }

    .wrap{ width:min(430px, 100%); }

    .card{
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 18px;
      padding: 26px;
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 70px rgba(0,0,0,0.45);
    }

    h1{ margin:0 0 6px; font-size:28px; }
    .sub{ margin:0 0 18px; color: rgba(255,255,255,0.70); font-size:14px; }

    label{
      display:block;
      margin: 12px 0 8px;
      font-size: 14px;
      color: rgba(255,255,255,0.75);
    }

    input{
      width:100%;
      padding: 14px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.25);
      color:#fff;
      outline:none;
      transition: 0.2s;
      font-size:14px;
    }

    input::placeholder{ color: rgba(255,255,255,0.55); }

    input:focus{
      border-color: rgba(93,24,220,0.65);
      box-shadow: 0 0 0 4px rgba(93,24,220,0.22);
    }

    .hint{
      margin: 8px 4px 0;
      font-size: 12px;
      color: rgba(255,255,255,0.60);
    }

    .row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin: 14px 0 18px;
      flex-wrap: wrap; /* responsive */
    }

    .check{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-size:13px;
      color: rgba(255,255,255,0.75);
      cursor:pointer;
      user-select:none;
    }

    .check input{
      width:16px;
      height:16px;
      margin:0;
    }

    .link{
      color:#c9b4ff;
      font-size:13px;
      text-decoration:none;
    }

    .link:hover{ text-decoration:underline; }

    /* Uiverse button */
    button {
      width:100%;
      padding: 17px 40px;
      border-radius: 50px;
      cursor: pointer;
      border: 0;
      background-color: white;
      box-shadow: rgb(0 0 0 / 5%) 0 0 8px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-size: 15px;
      transition: all 0.5s ease;
      color:#111;
    }

    button:hover {
      letter-spacing: 3px;
      background-color: hsl(261deg 80% 48%);
      color: #fff;
      box-shadow: rgb(93 24 220) 0px 7px 29px 0px;
    }

    button:active {
      transform: translateY(10px);
      transition: 100ms;
    }

    .bottom{
      margin-top:14px;
      text-align:center;
      font-size:13px;
      color: rgba(255,255,255,0.65);
    }

    /* ===== Responsive tweaks ===== */
    @media (max-width: 480px){
      body{ padding: 16px; }
      .card{ padding: 18px; border-radius: 16px; }
      h1{ font-size: 24px; }
      input{ padding: 12px; font-size: 14px; }
      button{ padding: 14px 22px; font-size: 14px; }
      .row{ gap: 8px; }
    }
  </style>
</head>

<body>
  <div class="bg"></div>

  <div class="wrap">
    <div class="card">
      <h1>Login</h1>
      <p class="sub">Enter your details</p>

      <form>
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="example@email.com" required>

        <label for="pass">Password</label>
        <input id="pass" type="password" placeholder="••••••••" minlength="7" required>
        <p class="hint">Password must be at least 7 characters</p>

        <div class="row">
          <label class="check">
            <input type="checkbox"> Remember me
          </label>
          <a href="#" class="link">Forgot password?</a>
        </div>

        <button type="submit">Login</button>

        <p class="bottom">
          Don’t have an account?
          <a href="#" class="link">Sign up</a>
        </p>
      </form>
    </div>
  </div>
</body>
</html>
